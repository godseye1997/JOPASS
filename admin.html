<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0C5467">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="JoPass">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <title>JoPass — Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="view-toggle" id="viewToggle">
    <button class="toggle-btn active" data-mode="mobile" onclick="setViewMode('mobile')">Phone</button>
    <button class="toggle-btn" data-mode="desktop" onclick="setViewMode('desktop')">Desktop</button>
  </div>

  <div class="phone-frame" id="phoneFrame">
    <div class="phone-notch"></div>
    <div class="app">

      <!-- Mobile Header -->
      <header class="mobile-header">
        <div class="mobile-header-left">
          <img src="logo.png" alt="JoPass" style="height:28px; object-fit:contain;">
        </div>
        <div class="mobile-header-right">
          <span style="font-size:.7rem; font-weight:700; color:var(--danger); background:rgba(225,112,85,.12); padding:3px 9px; border-radius:12px;">ADMIN</span>
          <a href="owner-login.html" style="font-size:.8rem; color:var(--text-muted); margin-left:10px;">🚪</a>
        </div>
      </header>

      <!-- Desktop Sidebar -->
      <aside class="sidebar">
        <div class="logo">
          <img src="logo.png" alt="JoPass" style="height:48px; object-fit:contain;">
        </div>
        <div style="padding:8px 24px 16px; font-size:.7rem; font-weight:700; letter-spacing:.08em; color:var(--danger); text-transform:uppercase;">Admin</div>
        <nav class="sidebar-nav">
          <a href="#" class="active" data-view="overview" onclick="adminNav('overview'); return false;">
            <span class="icon"><i data-lucide="layout-dashboard"></i></span> Overview
          </a>
          <a href="#" data-view="owners" onclick="adminNav('owners'); return false;">
            <span class="icon"><i data-lucide="users"></i></span> Approved Owners
          </a>
          <a href="#" data-view="bookings" onclick="adminNav('bookings'); return false;">
            <span class="icon"><i data-lucide="calendar"></i></span> All Bookings
          </a>
          <a href="#" data-view="reviews" onclick="adminNav('reviews'); return false;">
            <span class="icon"><i data-lucide="star"></i></span> Reviews
          </a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-info">
            <div class="user-avatar" style="background:var(--danger);">YH</div>
            <div class="user-details">
              <div class="name">Yazeed Hijazi</div>
              <div class="email">hijaziyazeed@gmail.com</div>
            </div>
          </div>
          <a href="owner-login.html" style="display:block; margin-top:12px; font-size:.8rem; color:var(--text-muted);">← Log out</a>
        </div>
      </aside>

      <main class="main" id="adminMain"></main>

      <!-- Bottom Tab Bar -->
      <nav class="bottom-nav">
        <a href="#" class="bottom-nav-item active" data-view="overview" onclick="adminNav('overview'); return false;">
          <span class="bottom-nav-icon"><i data-lucide="layout-dashboard"></i></span>
          <span class="bottom-nav-label">Overview</span>
        </a>
        <a href="#" class="bottom-nav-item" data-view="owners" onclick="adminNav('owners'); return false;">
          <span class="bottom-nav-icon"><i data-lucide="users"></i></span>
          <span class="bottom-nav-label">Owners</span>
        </a>
        <a href="#" class="bottom-nav-item" data-view="bookings" onclick="adminNav('bookings'); return false;">
          <span class="bottom-nav-icon"><i data-lucide="calendar"></i></span>
          <span class="bottom-nav-label">Bookings</span>
        </a>
        <a href="#" class="bottom-nav-item" data-view="reviews" onclick="adminNav('reviews'); return false;">
          <span class="bottom-nav-icon"><i data-lucide="star"></i></span>
          <span class="bottom-nav-label">Reviews</span>
        </a>
      </nav>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/native.js"></script>
  <script src="js/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/lucide.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/db.js"></script>
  <script src="js/admin.js"></script>
  <script>setViewMode('mobile'); lucide.createIcons();</script>
</body>
</html>
