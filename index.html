<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0C5467">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="JoPass">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <title>JoPass — Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body mode-mobile">

  <!-- View Toggle -->
  <div class="view-toggle" id="viewToggle">
    <button class="toggle-btn active" data-mode="mobile" onclick="setLoginViewMode('mobile')">Phone</button>
    <button class="toggle-btn" data-mode="desktop" onclick="setLoginViewMode('desktop')">Desktop</button>
  </div>

  <div class="phone-frame" id="phoneFrame">
    <div class="phone-notch"></div>
    <div class="login-scroll">
      <div class="login-container">
        <div class="login-card">
          <div class="logo">
            <img src="logo.png" alt="JoPass" style="height:72px; object-fit:contain;">
          </div>
          <p class="tagline">Book amazing experiences for less.</p>

          <form id="loginForm">
            <div class="input-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="input-group">
              <label for="password">Password</label>
              <input type="password" id="password" placeholder="••••••••">
            </div>
            <p id="loginError" style="color:var(--danger); font-size:.82rem; margin-bottom:12px; display:none;"></p>
            <button type="submit" class="btn btn-primary btn-full">Log In</button>
          </form>

          <p class="login-footer">Don't have an account? <a href="signup.html">Sign up</a></p>

          <div class="login-divider"><span>for businesses</span></div>
          <a href="owner-login.html" class="btn btn-outline btn-full" style="font-size:.85rem;">🏢 Owner Portal</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function setLoginViewMode(mode) {
      document.body.className = `login-body mode-${mode}`;
      document.querySelectorAll('.toggle-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn     = e.target.querySelector('button[type=submit]');
      const email   = document.getElementById('email').value.trim();
      const pass    = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      btn.textContent = 'Signing in…';
      btn.disabled    = true;
      const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        btn.textContent = 'Log In';
        btn.disabled    = false;
      } else {
        window.location.href = 'dashboard.html';
      }
    });

  </script>
  <script src="js/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
</body>
</html>
