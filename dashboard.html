<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoPass — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- View Toggle -->
  <div class="view-toggle" id="viewToggle">
    <button class="toggle-btn active" data-mode="mobile" onclick="setViewMode('mobile')">Phone</button>
    <button class="toggle-btn" data-mode="desktop" onclick="setViewMode('desktop')">Desktop</button>
  </div>

  <!-- Phone Frame (wraps app in mobile mode) -->
  <div class="phone-frame" id="phoneFrame">
    <div class="phone-notch"></div>

    <div class="app">
      <!-- Mobile Header -->
      <header class="mobile-header">
        <div class="mobile-header-left">
          <span class="logo-icon">⚡</span>
          <span class="mobile-logo">JoPass</span>
        </div>
        <div class="mobile-header-right">
          <div class="credit-pill" onclick="navigateTo('credits')">
            <span>💳</span>
            <span id="creditCountHeader">15</span>
          </div>
          <div class="user-avatar-sm">TU</div>
        </div>
      </header>

      <!-- Desktop Sidebar (hidden on mobile) -->
      <aside class="sidebar">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <h1>JoPass</h1>
        </div>
        <nav class="sidebar-nav">
          <a href="#" class="active" data-view="browse" onclick="navigateTo('browse'); return false;">
            <span class="icon">🔍</span> Browse Deals
          </a>
          <a href="#" data-view="credits" onclick="navigateTo('credits'); return false;">
            <span class="icon">💳</span> Buy Credits
            <span style="margin-left:auto; background:var(--primary); color:#fff; font-size:.75rem; padding:2px 8px; border-radius:12px;" id="creditCount">15</span>
          </a>
          <a href="#" data-view="bookings" onclick="navigateTo('bookings'); return false;">
            <span class="icon">📅</span> My Bookings
          </a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-info">
            <div class="user-avatar">TU</div>
            <div class="user-details">
              <div class="name">Test User</div>
              <div class="email">demo@jopass.com</div>
            </div>
          </div>
          <a href="index.html" style="display:block; margin-top:12px; font-size:.8rem; color:var(--text-muted);">← Log out</a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main" id="mainContent">
        <!-- Rendered by JS -->
      </main>

      <!-- Bottom Tab Bar (mobile) -->
      <nav class="bottom-nav">
        <a href="#" class="bottom-nav-item active" data-view="browse" onclick="navigateTo('browse'); return false;">
          <span class="bottom-nav-icon">🔍</span>
          <span class="bottom-nav-label">Browse</span>
        </a>
        <a href="#" class="bottom-nav-item" data-view="credits" onclick="navigateTo('credits'); return false;">
          <span class="bottom-nav-icon">💳</span>
          <span class="bottom-nav-label">Credits</span>
        </a>
        <a href="#" class="bottom-nav-item" data-view="bookings" onclick="navigateTo('bookings'); return false;">
          <span class="bottom-nav-icon">📅</span>
          <span class="bottom-nav-label">Bookings</span>
        </a>
        <a href="#" class="bottom-nav-item" data-view="profile" onclick="navigateTo('profile'); return false;">
          <span class="bottom-nav-icon">👤</span>
          <span class="bottom-nav-label">Profile</span>
        </a>
      </nav>
    </div>
  </div>

  <!-- Booking Modal -->
  <div class="modal-overlay" id="bookingModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Book Service</h3>
        <button class="modal-close" onclick="closeBookingModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeBookingModal()">Cancel</button>
        <button class="btn btn-primary" id="confirmBookingBtn" disabled onclick="confirmBooking()">Select Date & Time</button>
      </div>
    </div>
  </div>

  <!-- Payment Modal -->
  <div class="modal-overlay" id="paymentModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Complete Payment</h3>
        <button class="modal-close" onclick="closePaymentModal()">&times;</button>
      </div>
      <div class="modal-body" id="paymentModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closePaymentModal()">Cancel</button>
        <button class="btn btn-primary" id="payBtn" disabled onclick="processPayment()">Pay</button>
      </div>
    </div>
  </div>

  <!-- Review Modal -->
  <div class="modal-overlay" id="reviewModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Leave a Review</h3>
        <button class="modal-close" onclick="closeReviewModal()">&times;</button>
      </div>
      <div class="modal-body" id="reviewModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeReviewModal()">Skip</button>
        <button class="btn btn-primary" id="submitReviewBtn" disabled onclick="submitReview()">Submit</button>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Default to mobile view
    setViewMode('mobile');
  </script>
</body>
</html>
