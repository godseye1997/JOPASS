<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoPass — Owner Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body mode-mobile">

  <div class="view-toggle" id="viewToggle">
    <button class="toggle-btn active" data-mode="mobile" onclick="setLoginViewMode('mobile')">Phone</button>
    <button class="toggle-btn" data-mode="desktop" onclick="setLoginViewMode('desktop')">Desktop</button>
  </div>

  <div class="phone-frame" id="phoneFrame">
    <div class="phone-notch"></div>
    <div class="login-scroll">
      <div class="login-container">
        <div class="login-card">
          <div class="logo">
            <img src="logo.png" alt="JoPass" style="height:72px; object-fit:contain;">
          </div>
          <p class="tagline" style="margin-bottom:6px;">Owner & Admin Portal</p>
          <p style="text-align:center; font-size:.78rem; color:var(--text-muted); margin-bottom:24px;">Access is restricted to approved business accounts.</p>

          <form id="ownerLoginForm">
            <div class="input-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="you@business.com" autocomplete="email">
            </div>
            <div class="input-group">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                <label for="password" style="margin:0;">Password</label>
                <a href="#" onclick="showForgot(); return false;" style="font-size:.78rem; color:var(--primary);">Forgot password?</a>
              </div>
              <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <p id="loginError" style="color:var(--danger); font-size:.82rem; margin-bottom:12px; display:none;"></p>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
          </form>

          <div id="forgotPanel" style="display:none; margin-top:16px; padding:16px; background:var(--bg); border-radius:var(--radius-sm); border:1px solid var(--border);">
            <div style="font-weight:600; font-size:.88rem; margin-bottom:10px;">Reset your password</div>

            <div id="forgotStep1">
              <div class="input-group" style="margin-bottom:10px;">
                <label for="forgotEmail">Email address</label>
                <input type="email" id="forgotEmail" placeholder="you@business.com">
              </div>
              <p id="forgotMsg" style="font-size:.82rem; margin-bottom:10px; display:none;"></p>
              <button id="forgotSendBtn" class="btn btn-primary btn-full" onclick="sendResetCode()">Send Code</button>
              <button class="btn btn-outline btn-full" style="margin-top:8px;" onclick="hideForgot()">Cancel</button>
            </div>

            <div id="forgotStep2" style="display:none;">
              <p style="font-size:.82rem; color:var(--text-muted); margin-bottom:12px;">Enter the 6-digit code sent to your email.</p>
              <div class="input-group" style="margin-bottom:10px;">
                <label for="forgotCode">Verification code</label>
                <input type="text" id="forgotCode" placeholder="123456" maxlength="6" inputmode="numeric">
              </div>
              <div class="input-group" style="margin-bottom:10px;">
                <label for="forgotNewPass">New password</label>
                <input type="password" id="forgotNewPass" placeholder="At least 6 characters">
              </div>
              <div class="input-group" style="margin-bottom:10px;">
                <label for="forgotConfirmPass">Confirm password</label>
                <input type="password" id="forgotConfirmPass" placeholder="••••••••">
              </div>
              <p id="forgotStep2Msg" style="font-size:.82rem; margin-bottom:10px; display:none;"></p>
              <button id="forgotVerifyBtn" class="btn btn-primary btn-full" onclick="verifyResetCode()">Set New Password</button>
              <button class="btn btn-outline btn-full" style="margin-top:8px;" onclick="hideForgot()">Cancel</button>
            </div>
          </div>

          <p class="login-footer" style="margin-top:16px;">
            New owner? <a href="owner-signup.html">Create your account</a>
          </p>
          <p class="login-footer">
            Not an owner? <a href="index.html">Customer login</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let _resetEmail = '';

    function showForgot() {
      document.getElementById('forgotPanel').style.display = 'block';
      document.getElementById('forgotEmail').value = document.getElementById('email').value;
      document.getElementById('forgotMsg').style.display = 'none';
      document.getElementById('forgotStep1').style.display = 'block';
      document.getElementById('forgotStep2').style.display = 'none';
    }
    function hideForgot() {
      document.getElementById('forgotPanel').style.display = 'none';
    }

    async function sendResetCode() {
      const email = document.getElementById('forgotEmail').value.trim();
      const msgEl = document.getElementById('forgotMsg');
      const btn   = document.getElementById('forgotSendBtn');
      if (!email) { msgEl.textContent = 'Please enter your email.'; msgEl.style.color = 'var(--danger)'; msgEl.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Sending…';
      const { error } = await _supabase.auth.signInWithOtp({ email, options: { shouldCreateUser: false } });
      if (error) {
        msgEl.textContent = error.message; msgEl.style.color = 'var(--danger)'; msgEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Send Code';
      } else {
        _resetEmail = email;
        document.getElementById('forgotStep1').style.display = 'none';
        document.getElementById('forgotStep2').style.display = 'block';
      }
    }

    async function verifyResetCode() {
      const code    = document.getElementById('forgotCode').value.trim();
      const pass    = document.getElementById('forgotNewPass').value;
      const confirm = document.getElementById('forgotConfirmPass').value;
      const msgEl   = document.getElementById('forgotStep2Msg');
      const btn     = document.getElementById('forgotVerifyBtn');
      if (!code)           { msgEl.textContent = 'Enter the 6-digit code.'; msgEl.style.color = 'var(--danger)'; msgEl.style.display = 'block'; return; }
      if (pass.length < 6) { msgEl.textContent = 'Password must be at least 6 characters.'; msgEl.style.color = 'var(--danger)'; msgEl.style.display = 'block'; return; }
      if (pass !== confirm) { msgEl.textContent = 'Passwords do not match.'; msgEl.style.color = 'var(--danger)'; msgEl.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Verifying…';
      const { error: verifyErr } = await _supabase.auth.verifyOtp({ email: _resetEmail, token: code, type: 'magiclink' });
      if (verifyErr) {
        msgEl.textContent = 'Invalid or expired code.'; msgEl.style.color = 'var(--danger)'; msgEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Set New Password'; return;
      }
      const { error: updateErr } = await _supabase.auth.updateUser({ password: pass });
      if (updateErr) {
        msgEl.textContent = updateErr.message; msgEl.style.color = 'var(--danger)'; msgEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Set New Password';
      } else {
        await _supabase.auth.signOut();
        hideForgot();
        const errorEl = document.getElementById('loginError');
        errorEl.textContent = 'Password updated! Please log in with your new password.';
        errorEl.style.color = 'var(--success)';
        errorEl.style.display = 'block';
      }
    }

    function setLoginViewMode(mode) {
      document.body.className = `login-body mode-${mode}`;
      document.querySelectorAll('.toggle-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
    }

    document.getElementById('ownerLoginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email   = document.getElementById('email').value.trim().toLowerCase();
      const pass    = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      const btn     = e.target.querySelector('button[type=submit]');

      btn.textContent = 'Signing in…';
      btn.disabled    = true;

      const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });

      if (error) {
        errorEl.textContent = 'Incorrect email or password.';
        errorEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled    = false;
        return;
      }

      const { data: profile, error: profileError } = await _supabase
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single();

      if (profileError) {
        console.error('Profile fetch error:', profileError);
        errorEl.textContent = 'Profile error: ' + profileError.message;
        errorEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled    = false;
        return;
      }

      if (profile?.role === 'admin') {
        window.location.href = 'admin.html';
      } else if (profile?.role === 'owner') {
        window.location.href = 'owner.html';
      } else {
        await _supabase.auth.signOut();
        errorEl.textContent = `Access denied. Role is: "${profile?.role || 'not set'}"`;
        errorEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled    = false;
      }
    });
  </script>
  <script src="js/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
</body>
</html>
