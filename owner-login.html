<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0C5467">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="JoPass">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <title>JoPass — Owner Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body mode-mobile">


  <div class="phone-frame" id="phoneFrame">
    <div class="phone-notch"></div>
    <div class="login-scroll">
      <div class="login-container">
        <div class="login-card">
          <div style="text-align:right; margin-bottom:8px;">
            <button class="lang-toggle-btn" onclick="setLang(_lang === 'ar' ? 'en' : 'ar')"
              style="background:none; border:1.5px solid var(--border); border-radius:20px; padding:4px 12px; font-size:.8rem; font-weight:700; color:var(--primary); cursor:pointer;">
              عر
            </button>
          </div>
          <div class="logo">
            <img src="logo.png" alt="JoPass" style="height:72px; object-fit:contain;">
          </div>
          <p class="tagline" id="olTagline" style="margin-bottom:6px;">Owner & Admin Portal</p>
          <p id="olSubtitle" style="text-align:center; font-size:.78rem; color:var(--text-muted); margin-bottom:24px;">Access is restricted to approved business accounts.</p>

          <form id="ownerLoginForm">
            <div class="input-group">
              <label for="email" id="olEmailLabel">Email</label>
              <input type="email" id="email" placeholder="you@business.com" autocomplete="email">
            </div>
            <div class="input-group">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                <label for="password" id="olPasswordLabel" style="margin:0;">Password</label>
                <a href="#" id="olForgotLink" onclick="sendForgotPassword(); return false;" style="font-size:.78rem; color:var(--primary);">Forgot password?</a>
              </div>
              <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <p id="loginError" style="color:var(--danger); font-size:.82rem; margin-bottom:12px; display:none;"></p>
            <button type="submit" id="olSigninBtn" class="btn btn-primary btn-full">Sign In</button>
          </form>

          <div id="forgotPanel" style="display:none; margin-top:16px; padding:16px; background:var(--bg); border-radius:var(--radius-sm); border:1px solid var(--border);">
            <div id="olResetTitle" style="font-weight:600; font-size:.88rem; margin-bottom:10px;">Reset your password</div>
            <div class="input-group" style="margin-bottom:10px;">
              <label for="forgotEmail" id="olForgotEmailLabel">Email address</label>
              <input type="email" id="forgotEmail" placeholder="you@business.com">
            </div>
            <p id="forgotMsg" style="font-size:.82rem; margin-bottom:10px; display:none;"></p>
            <button id="olSendResetBtn" class="btn btn-primary btn-full" onclick="sendForgotEmail()">Send Reset Link</button>
            <button id="olCancelBtn" class="btn btn-outline btn-full" style="margin-top:8px;" onclick="document.getElementById('forgotPanel').style.display='none'">Cancel</button>
          </div>

          <p class="login-footer" style="margin-top:16px;">
            <span id="olNewOwner">New owner?</span> <a href="owner-signup.html" id="olCreateAccount">Create your account</a>
          </p>
          <p class="login-footer">
            <span id="olNotOwner">Not an owner?</span> <a href="login.html" id="olCustomerLogin">Customer login</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function setLoginViewMode(mode) {
      document.body.className = `login-body mode-${mode}`;
      document.querySelectorAll('.toggle-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
    }

    document.getElementById('ownerLoginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email   = document.getElementById('email').value.trim().toLowerCase();
      const pass    = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      const btn     = e.target.querySelector('button[type=submit]');

      btn.textContent = 'Signing in…';
      btn.disabled    = true;

      const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });

      if (error) {
        errorEl.textContent = 'Incorrect email or password.';
        errorEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled    = false;
        return;
      }

      const { data: profile, error: profileError } = await _supabase
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single();

      if (profileError) {
        console.error('Profile fetch error:', profileError);
        errorEl.textContent = 'Profile error: ' + profileError.message;
        errorEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled    = false;
        return;
      }

      if (profile?.role === 'admin') {
        window.location.href = 'admin.html';
      } else if (profile?.role === 'owner') {
        window.location.href = 'owner.html';
      } else {
        await _supabase.auth.signOut();
        errorEl.textContent = `Access denied. Role is: "${profile?.role || 'not set'}"`;
        errorEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled    = false;
      }
    });
  </script>
  <script>
    function sendForgotPassword() {
      const panel = document.getElementById('forgotPanel');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      document.getElementById('forgotEmail').value = document.getElementById('email').value;
      document.getElementById('forgotMsg').style.display = 'none';
    }
    async function sendForgotEmail() {
      const email = document.getElementById('forgotEmail').value.trim();
      const msgEl = document.getElementById('forgotMsg');
      const btn   = document.querySelector('#forgotPanel .btn-primary');
      if (!email) { msgEl.textContent = 'Please enter your email.'; msgEl.style.color = 'var(--danger)'; msgEl.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Sending…';
      const { error } = await _supabase.auth.resetPasswordForEmail(email, {
        redirectTo: 'com.jopass.app://reset-password',
      });
      if (error) {
        msgEl.textContent = error.message; msgEl.style.color = 'var(--danger)';
      } else {
        msgEl.textContent = 'Check your email and tap the reset link to open the app.';
        msgEl.style.color = 'var(--success)';
        btn.textContent = 'Sent!';
      }
      msgEl.style.display = 'block';
    }
  </script>
  <script src="js/i18n.js"></script>
  <script src="js/native.js"></script>
  <script src="js/deeplink.js"></script>
  <script src="js/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    if (!window.Capacitor?.isNativePlatform() && window.innerWidth > 768) {
      document.body.classList.replace('mode-mobile', 'mode-desktop');
    }
    function _applyOwnerLoginLang() {
      const el = id => document.getElementById(id);
      if (el('olTagline'))         el('olTagline').textContent         = _lang === 'ar' ? 'بوابة الملاك والمديرين' : 'Owner & Admin Portal';
      if (el('olSubtitle'))        el('olSubtitle').textContent        = _lang === 'ar' ? 'الوصول مقتصر على حسابات الأعمال المعتمدة.' : 'Access is restricted to approved business accounts.';
      if (el('olEmailLabel'))      el('olEmailLabel').textContent      = t('login.email');
      if (el('olPasswordLabel'))   el('olPasswordLabel').textContent   = t('login.password');
      if (el('olForgotLink'))      el('olForgotLink').textContent      = t('login.forgot');
      if (el('olSigninBtn') && el('olSigninBtn').textContent.trim() !== (_lang === 'ar' ? 'جارٍ الدخول…' : 'Signing in…'))
        el('olSigninBtn').textContent = t('login.signin');
      if (el('olResetTitle'))      el('olResetTitle').textContent      = t('login.resetTitle');
      if (el('olForgotEmailLabel')) el('olForgotEmailLabel').textContent = t('login.resetEmail');
      if (el('olSendResetBtn'))    el('olSendResetBtn').textContent    = t('login.sendReset');
      if (el('olCancelBtn'))       el('olCancelBtn').textContent       = t('dialog.cancel');
      if (el('olNewOwner'))        el('olNewOwner').textContent        = _lang === 'ar' ? 'مالك جديد؟' : 'New owner?';
      if (el('olCreateAccount'))   el('olCreateAccount').textContent   = _lang === 'ar' ? 'أنشئ حسابك' : 'Create your account';
      if (el('olNotOwner'))        el('olNotOwner').textContent        = _lang === 'ar' ? 'لست مالكاً؟' : 'Not an owner?';
      if (el('olCustomerLogin'))   el('olCustomerLogin').textContent   = _lang === 'ar' ? 'دخول العملاء' : 'Customer login';
    }
    const _olOrigSetLang = typeof setLang === 'function' ? setLang : null;
    window.setLang = function(lang) { if (_olOrigSetLang) _olOrigSetLang(lang); _applyOwnerLoginLang(); };
    document.addEventListener('DOMContentLoaded', _applyOwnerLoginLang);
    // Auto-login: skip login screen if session already exists
    (async () => {
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) return;
      const { data: profile } = await _supabase.from('profiles').select('role').eq('id', session.user.id).single();
      if (profile?.role === 'admin') window.location.replace('admin.html');
      else if (profile?.role === 'owner') window.location.replace('owner.html');
    })();
  </script>
</body>
</html>
