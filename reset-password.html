<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoPass — Reset Password</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body mode-mobile">

  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="login-scroll">
      <div class="login-container">
        <div class="login-card">
          <div class="logo">
            <img src="logo.png" alt="JoPass" style="height:72px; object-fit:contain;">
          </div>
          <p class="tagline" style="margin-bottom:24px;">Set a new password</p>

          <div id="loading" style="text-align:center; color:var(--text-muted); font-size:.88rem; padding:20px 0;">
            Verifying your link…
          </div>

          <div id="resetForm" style="display:none;">
            <div class="input-group">
              <label for="newPassword">New Password</label>
              <input type="password" id="newPassword" placeholder="At least 6 characters" autocomplete="new-password">
            </div>
            <div class="input-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password">
            </div>
            <p id="resetError" style="color:var(--danger); font-size:.82rem; margin-bottom:12px; display:none;"></p>
            <button id="resetBtn" class="btn btn-primary btn-full" onclick="submitReset()">Set New Password</button>
          </div>

          <div id="successMsg" style="display:none; text-align:center; padding:20px 0;">
            <div style="font-size:2.5rem; margin-bottom:12px;">✅</div>
            <div style="font-weight:600; margin-bottom:8px;">Password updated!</div>
            <p style="font-size:.85rem; color:var(--text-muted); margin-bottom:20px;">You can now sign in with your new password.</p>
            <a href="index.html" class="btn btn-primary btn-full">Go to Login</a>
          </div>

          <div id="errorMsg" style="display:none; text-align:center; padding:20px 0;">
            <div style="font-size:2.5rem; margin-bottom:12px;">❌</div>
            <div style="font-weight:600; margin-bottom:8px;">Invalid or expired link</div>
            <p style="font-size:.85rem; color:var(--text-muted); margin-bottom:20px;">Request a new password reset link.</p>
            <a href="index.html" class="btn btn-outline btn-full">Back to Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    // Supabase fires PASSWORD_RECOVERY when the recovery token is in the URL hash
    _supabase.auth.onAuthStateChange(async (event, session) => {
      const loading = document.getElementById('loading');
      if (event === 'PASSWORD_RECOVERY') {
        loading.style.display = 'none';
        document.getElementById('resetForm').style.display = 'block';
      } else if (event === 'SIGNED_IN' && !session) {
        loading.style.display = 'none';
        document.getElementById('errorMsg').style.display = 'block';
      }
    });

    // Fallback: if no event fires within 3 seconds, show error
    setTimeout(() => {
      if (document.getElementById('loading').style.display !== 'none') {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'block';
      }
    }, 3000);

    async function submitReset() {
      const pass    = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const errorEl = document.getElementById('resetError');
      const btn     = document.getElementById('resetBtn');

      if (pass.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.style.display = 'block'; return;
      }
      if (pass !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block'; return;
      }

      btn.disabled    = true;
      btn.textContent = 'Updating…';

      const { error } = await _supabase.auth.updateUser({ password: pass });
      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Set New Password';
      } else {
        document.getElementById('resetForm').style.display  = 'none';
        document.getElementById('successMsg').style.display = 'block';
      }
    }
  </script>
</body>
</html>
