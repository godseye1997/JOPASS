<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0C5467">
  <title>JoPass — Reset Password</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body mode-mobile">

  <div class="phone-frame" id="phoneFrame">
    <div class="phone-notch"></div>
    <div class="login-scroll">
      <div class="login-container">
        <div class="login-card">
          <div class="logo">
            <img src="logo.png" alt="JoPass" style="height:72px; object-fit:contain;">
          </div>
          <p class="tagline">Set your new password.</p>

          <div id="loadingState" style="text-align:center; padding:24px 0; color:var(--text-muted); font-size:.9rem;">
            Verifying reset link…
          </div>

          <form id="resetForm" style="display:none;">
            <div class="input-group">
              <label for="newPassword">New Password</label>
              <input type="password" id="newPassword" placeholder="••••••••" minlength="6">
            </div>
            <div class="input-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <p id="resetError" style="color:var(--danger); font-size:.82rem; margin-bottom:12px; display:none;"></p>
            <button type="submit" class="btn btn-primary btn-full">Set New Password</button>
          </form>

          <div id="invalidState" style="display:none; text-align:center; padding:16px 0;">
            <p style="color:var(--danger); font-size:.88rem; margin-bottom:16px;">This reset link is invalid or has expired.</p>
            <a href="login.html" class="btn btn-primary btn-full" style="display:block;">Back to Login</a>
          </div>

          <div id="successState" style="display:none; text-align:center; padding:16px 0;">
            <p style="color:var(--success); font-size:.88rem; margin-bottom:16px;">Password updated successfully!</p>
            <a href="login.html" class="btn btn-primary btn-full" style="display:block;">Log In</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    let _sessionReady = false;

    function _showForm() {
      if (_sessionReady) return;
      _sessionReady = true;
      document.getElementById('loadingState').style.display  = 'none';
      document.getElementById('invalidState').style.display = 'none';
      document.getElementById('resetForm').style.display    = 'block';
    }
    function _showInvalid() {
      if (_sessionReady) return;
      document.getElementById('loadingState').style.display  = 'none';
      document.getElementById('resetForm').style.display     = 'none';
      document.getElementById('invalidState').style.display = 'block';
    }

    // supabase-js fires PASSWORD_RECOVERY once it auto-detects the recovery
    // token in the URL (hash flow). Show the form when that or a session appears.
    _supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY' || (session && (event === 'SIGNED_IN' || event === 'INITIAL_SESSION'))) {
        _showForm();
      }
    });

    (async () => {
      // PKCE flow: email link lands here with ?code=xxx
      const code = new URL(window.location.href).searchParams.get('code');
      if (code) {
        const { error } = await _supabase.auth.exchangeCodeForSession(code);
        if (!error) { _showForm(); return; }
      }

      // Hash flow: give supabase-js a moment to auto-detect and set the session
      for (let i = 0; i < 20 && !_sessionReady; i++) {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) { _showForm(); return; }
        await new Promise(r => setTimeout(r, 150));
      }
      _showInvalid();
    })();

    document.getElementById('resetForm').addEventListener('submit', async e => {
      e.preventDefault();
      const password = document.getElementById('newPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;
      const errorEl  = document.getElementById('resetError');
      const btn      = e.target.querySelector('button[type=submit]');

      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.style.display = 'block';
        return;
      }
      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';
      btn.disabled    = true;
      btn.textContent = 'Updating…';

      const { error } = await _supabase.auth.updateUser({ password });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Set New Password';
      } else {
        document.getElementById('resetForm').style.display  = 'none';
        document.getElementById('successState').style.display = 'block';
        await _supabase.auth.signOut();
      }
    });

    if (!window.Capacitor?.isNativePlatform() && window.innerWidth > 768) {
      document.body.classList.replace('mode-mobile', 'mode-desktop');
    }
  </script>
</body>
</html>
