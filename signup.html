<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0C5467">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="JoPass">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <title>JoPass — Sign Up</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body mode-mobile">


  <div class="phone-frame" id="phoneFrame">
    <div class="phone-notch"></div>
    <div class="login-scroll">
      <div class="login-container">
        <div class="login-card">
          <div class="logo">
            <img src="logo.png" alt="JoPass" style="height:72px; object-fit:contain;">
          </div>
          <p class="tagline">Create your account and start saving.</p>

          <form id="signupForm">
            <div class="input-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" placeholder="Your Full Name">
            </div>
            <div class="input-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="input-group">
              <label for="phone">Phone Number</label>
              <div style="display:flex; gap:8px;">
                <select id="phoneCode" style="padding:11px 8px; border:2px solid var(--border); border-radius:var(--radius-sm); font-size:.85rem; background:var(--surface); color:var(--text); flex-shrink:0;">
                  <option value="+962">🇯🇴 +962</option>
                  <option value="+966">🇸🇦 +966</option>
                  <option value="+971">🇦🇪 +971</option>
                  <option value="+965">🇰🇼 +965</option>
                  <option value="+44">🇬🇧 +44</option>
                  <option value="+1">🇺🇸 +1</option>
                </select>
                <input type="tel" id="phone" placeholder="79 123 4567" style="flex:1;">
              </div>
            </div>
            <div class="input-group">
              <label for="password">Password</label>
              <div style="position:relative;">
                <input type="password" id="password" placeholder="••••••••" style="padding-right:44px;">
                <button type="button" onclick="togglePw('password','eyeP')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0;line-height:1;">
                  <svg id="eyeP" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <div class="input-group">
              <label for="confirmPassword">Confirm Password</label>
              <div style="position:relative;">
                <input type="password" id="confirmPassword" placeholder="••••••••" style="padding-right:44px;">
                <button type="button" onclick="togglePw('confirmPassword','eyeC')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);padding:0;line-height:1;">
                  <svg id="eyeC" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <p id="formError" style="color:var(--danger); font-size:.82rem; margin-bottom:12px; display:none;"></p>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
          </form>

          <p class="login-footer">Already have an account? <a href="login.html">Log in</a></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Welcome overlay -->
  <div id="welcomeOverlay" onclick="dismissWelcome()" style="
    display:flex; position:fixed; inset:0; z-index:9999;
    background:linear-gradient(135deg,#083D4F,#0C5467 50%,#1ECFC3);
    align-items:center; justify-content:center; flex-direction:column;
    text-align:center; padding:40px; cursor:pointer;
    transition:opacity .4s;
  ">
    <div style="margin-bottom:20px;"><img src="icon.png" alt="JoPass" style="height:72px; object-fit:contain;"></div>
    <h1 style="color:#fff; font-size:2rem; margin-bottom:10px;">Welcome to JoPass</h1>
    <p style="color:rgba(255,255,255,.85); font-size:1rem; margin-bottom:40px; max-width:260px; line-height:1.6;">Book amazing experiences for less. Create your account to get started.</p>
    <div style="background:rgba(255,255,255,.2); color:#fff; font-size:.85rem; font-weight:600; padding:12px 28px; border-radius:24px; border:1.5px solid rgba(255,255,255,.4);">Tap to sign up</div>
  </div>

  <script>
    function togglePw(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon  = document.getElementById(iconId);
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      icon.style.opacity = show ? '1' : '0.4';
    }

    // Capture referral code from URL e.g. signup.html?ref=JO-AB12
    (function() {
      const ref = new URLSearchParams(window.location.search).get('ref');
      if (ref) sessionStorage.setItem('jopass_ref', ref);
    })();

    function setLoginViewMode(mode) {
      document.body.className = `login-body mode-${mode}`;
      document.querySelectorAll('.toggle-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
    }

    function dismissWelcome() {
      const overlay = document.getElementById('welcomeOverlay');
      overlay.style.opacity = '0';
      setTimeout(() => overlay.style.display = 'none', 400);
    }

    document.getElementById('signupForm').addEventListener('submit', async e => {
      e.preventDefault();
      const name     = document.getElementById('fullName').value.trim();
      const email    = document.getElementById('email').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const code     = document.getElementById('phoneCode').value;
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirmPassword').value;
      const errorEl  = document.getElementById('formError');
      const btn      = e.target.querySelector('button[type=submit]');

      if (!name || !email || !phone || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.style.display = 'block';
        return;
      }
      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';
      btn.textContent = 'Creating account…';
      btn.disabled = true;

      const { data, error } = await _supabase.auth.signUp({
        email,
        password,
        options: { data: { full_name: name } }
      });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        btn.textContent = 'Create Account';
        btn.disabled = false;
        return;
      }

      // Save phone to profile
      if (data.user) {
        await _supabase.from('profiles').update({
          full_name: name,
          phone: code + phone,
          credits: 0
        }).eq('id', data.user.id);

        // Apply referral if came via a referral link
        const refCode = sessionStorage.getItem('jopass_ref');
        if (refCode) {
          await _supabase.rpc('claim_referral_signup', { p_code: refCode }).catch(() => {});
          sessionStorage.removeItem('jopass_ref');
        }
      }

      window.location.href = 'dashboard.html';
    });
  </script>
  <script src="js/native.js"></script>
  <script src="js/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    if (!window.Capacitor?.isNativePlatform() && window.innerWidth > 768) {
      document.body.classList.replace('mode-mobile', 'mode-desktop');
    }
  </script>
</body>
</html>
